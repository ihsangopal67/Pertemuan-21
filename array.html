<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manipulasi Array - Modul 18 PPW</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="container" style="max-width: 500px">
      <div class="card shadow border-0 p-4 rounded-4">
        <h2 class="text-center text-dark mb-1 fw-bold">Manipulasi Array</h2>

        <p class="text-center text-muted small mb-4">
          Jumlah elemen saat ini:
          <span id="arrayLength" class="fw-bold text-primary">0</span>
        </p>

        <div
          id="arrayDisplay"
          class="bg-secondary bg-opacity-10 border-start border-4 border-primary p-3 mb-3 fs-5 fw-bold text-center rounded-end text-break"
        ></div>

        <div class="mb-4">
          <input
            type="text"
            id="itemInput"
            class="form-control form-control-lg fs-6"
            placeholder="Ketik nama buah baru..."
          />
        </div>

        <div class="row g-2">
          <div class="col-6">
            <button
              class="btn btn-success w-100 py-2 fw-semibold"
              onclick="tambahBelakang()"
            >
              1. Push (Belakang)
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn btn-success w-100 py-2 fw-semibold"
              onclick="tambahDepan()"
            >
              2. Unshift (Depan)
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn btn-danger w-100 py-2 fw-semibold"
              onclick="hapusBelakang()"
            >
              3. Pop (Belakang)
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn btn-danger w-100 py-2 fw-semibold"
              onclick="hapusDepan()"
            >
              4. Shift (Depan)
            </button>
          </div>
          
          <div class="col-6">
            <button
              class="btn btn-warning w-100 py-2 fw-semibold text-dark"
              onclick="urutkanArray()"
            >
              5. Sort (A-Z)
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn btn-warning w-100 py-2 fw-semibold text-dark"
              onclick="balikArray()"
            >
              6. Reverse (Balik)
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      
      let buah = ["Apel", "Mangga", "Pisang"];

     
      function updateTampilan() {
        const display = document.getElementById("arrayDisplay");
        const lengthDisplay = document.getElementById("arrayLength");

        lengthDisplay.innerText = buah.length;

        if (buah.length === 0) {
          display.innerHTML = "<em class='text-muted small'>Array Kosong</em>";
        } else {
          display.innerText = buah.join(" ➔ ");
        }
      }

      // Fungsi mengambil nilai input
      function AmbilInput() {
        const input = document.getElementById("itemInput");
        const nilai = input.value.trim();
        input.value = "";
        return nilai;
      }

      function tambahBelakang() {
        let nilaiBaru = AmbilInput();
        if (nilaiBaru !== "") {
          buah.push(nilaiBaru);
          updateTampilan();
        } else {
          alert("Isi kolom teks terlebih dahulu!");
        }
      }

      function tambahDepan() {
        let nilaiBaru = AmbilInput();
        if (nilaiBaru !== "") {
          buah.unshift(nilaiBaru);
          updateTampilan();
        } else {
          alert("Isi kolom teks terlebih dahulu!");
        }
      }

      function hapusBelakang() {
        if (buah.length > 0) {
          buah.pop();
          updateTampilan();
        } else {
          alert("Array sudah kosong!");
        }
      }

      function hapusDepan() {
        if (buah.length > 0) {
          buah.shift();
          updateTampilan();
        } else {
          alert("Array sudah kosong!");
        }
      }

      // --- TAMBAHAN METHOD UNTUK TUGAS MODUL 18 ---
      function urutkanArray() {
        if (buah.length > 0) {
          buah.sort();
          updateTampilan();
        } else {
          alert("Array kosong, tidak ada yang bisa diurutkan!");
        }
      }

      function balikArray() {
        if (buah.length > 0) {
          buah.reverse();
          updateTampilan();
        } else {
          alert("Array kosong, tidak ada yang bisa dibalik!");
        }
      }

      // Jalankan saat pertama kali dimuat
      updateTampilan();
    </script>
  </body>
</html>
